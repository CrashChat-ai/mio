          $ref: '#/components/schemas/mio.admin.v1.Account'
      title: SetRateLimitResponse
      additionalProperties: false
    mio.admin.v1.StartInstallRequest:
      type: object
      properties:
        tenantId:
          type: string
          title: tenant_id
        channelType:
          type: string
          title: channel_type
        provider:
          type: string
          title: provider
          description: optional; defaults to "default"
      title: StartInstallRequest
      additionalProperties: false
    mio.admin.v1.StartInstallResponse:
      type: object
      properties:
        installId:
          type: string
          title: install_id
        oauthUrl:
          type: string
