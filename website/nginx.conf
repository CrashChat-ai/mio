server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Starlight is a static MPA: serve the file, the dir's index.html, the
  # .html variant, else fall through to the generated 404 page.
  location / {
    try_files $uri $uri/ $uri.html =404;
  }
  error_page 404 /404.html;
}
