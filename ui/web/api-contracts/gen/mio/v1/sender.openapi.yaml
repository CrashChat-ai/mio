openapi: 3.1.0
info:
  title: mio.v1
paths: {}
components:
  schemas:
    mio.v1.PeerKind:
      type: string
      title: PeerKind
      enum:
        - PEER_KIND_UNSPECIFIED
        - PEER_KIND_DIRECT
        - PEER_KIND_GROUP
      description: |-
        PeerKind distinguishes direct vs. group senders.
         Kept on the wire for fast policy routing without DB lookup.
    mio.v1.Sender:
      type: object
      properties:
        externalId:
          type: string
          title: external_id
          description: platform user id (cliq sender_id, slack user id, ...)
        displayName:
          type: string
          title: display_name
        peerKind:
          title: peer_kind
          description: direct | group — used for fast policy routing
          $ref: '#/components/schemas/mio.v1.PeerKind'
        isBot:
          type: boolean
          title: is_bot
      title: Sender
      additionalProperties: false
      description: |-
        Sender carries the platform-side identity of the message author.
         user_id (canonical mio user) is deliberately absent — cross-channel identity
         merge runs in MIU after the message is consumed, not at ingest time. Keeping
         the DB lookup off the hot path lets the gateway ack Cliq within the 5 s deadline.
security: []
