# FluxCD HelmRelease for mio-media-vault — reference template.
#
# Copy this into your infra repo (e.g. `fluxcd/apps/prod/mio/release-media-vault.yaml`)
# and substitute the deployment-specific values below (`gcpServiceAccount`,
# `config.storageBucket`). It lives here in the mio repo so the chart and the
# HelmRelease shape evolve together; the deployed copy belongs to your infra repo.
#
# Don't forget to also append `- release-media-vault.yaml` to your
# kustomization.yaml alongside the chart's HelmRelease.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mio-media-vault
  namespace: mio
spec:
  interval: 30m0s
  timeout: 10m
  dependsOn:
    - name: mio-nats
    - name: mio-gateway
  chart:
    spec:
      chart: deploy/charts/mio-media-vault
      sourceRef:
        kind: GitRepository
        name: mio-charts
        namespace: mio
  values:
    image:
      tag: "main"  # bump to the merge SHA on each release
    serviceAccount:
      gcpServiceAccount: "mio-attachments@<your-gcp-project>.iam.gserviceaccount.com"
    config:
      storageBucket: "<your-mio-attachments-bucket>"
      storagePrefix: "mio/attachments/"
