replicaCount: 1

api:
  image:
    repository: ghcr.io/crashchat-ai/mio/web-api
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources: {}

frontend:
  image:
    repository: ghcr.io/crashchat-ai/mio/web-frontend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 80
  resources: {}

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

service:
  type: ClusterIP

nodeSelector: {}
tolerations: []
affinity: {}

web:
  publicUrl: "https://mio-web.example.com"
  authMode: "google"
  cookieSecure: true

operators:
  emails: []
  domains:
    - "example.com"
  defaultRole: "viewer"
  # Entries accept email=role or domain=role. Supported roles are:
  # viewer, operator, credential-admin.
  roles: []

session:
  ttl: "12h"
  # Secret containing DATABASE_URL. Reuse the gateway DB secret unless an
  # environment splits web sessions into a separate database/user.
  databaseSecretName: "mio-gateway-secrets"
  databaseSecretKey: "DATABASE_URL"

google:
  # Existing Secret with Google OAuth client credentials for operator login.
  # This is intentionally separate from provider install OAuth secrets.
  existingSecret: "mio-web-oauth"
  clientIDKey: "GOOGLE_CLIENT_ID"
  clientSecretKey: "GOOGLE_CLIENT_SECRET"
  # Empty means MIO_WEB_PUBLIC_URL + /auth/callback.
  redirectUrl: ""

stateSecret:
  # Existing Secret with a high-entropy value used to sign OAuth state cookies.
  existingSecret: "mio-web-session"
  key: "STATE_SECRET"

admin:
  # Use a cluster DNS name or service mesh endpoint. Do not point this at
  # localhost unless AdminService runs in the same pod.
  url: "http://mio-admin:9090"

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  host: "mio-web.example.com"
  # /api, /auth, /healthz hit the API; /* hits the frontend. Specific prefixes
  # are declared before the catch-all so the SPA never shadows auth routes.
  apiPaths:
    - path: /api
      pathType: Prefix
    - path: /auth
      pathType: Prefix
    - path: /healthz
      pathType: Exact
  tls: []
  # tls:
  #   - secretName: mio-web-tls
  #     hosts:
  #       - mio-web.example.com

networkPolicy:
  enabled: true
  ingress:
    # Override this to restrict browser ingress to an ingress controller,
    # load balancer, service mesh gateway, or VPN namespace.
    from: []
  egress:
    allowDNS: true
    allowHTTPS: true
    admin:
      port: 9090
      to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: mio-admin
    postgres:
      port: 5432
      to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres

env: []
