# mio-jetstream-bootstrap values
# This chart is VERIFY-ONLY. It asserts streams/consumers exist post-install.
# It does NOT create or mutate JetStream resources.

natsUrl: "nats://mio-nats:4222"

# Image for the verification Job (nats CLI available).
image:
  repository: natsio/nats-box
  tag: "0.14.5"
  pullPolicy: IfNotPresent

# Retry config for the quorum-wait polling loop.
retryCount: 5
retrySleepSeconds: 10

# Expected streams (verify-only; owning services provision these on startup).
expectedStreams:
  - name: MESSAGES_INBOUND
    subjects: ["mio.inbound.>"]
    replicas: 3
    retention: limits
    minMaxAgeSeconds: 604800
  - name: MESSAGES_OUTBOUND
    subjects: ["mio.outbound.>"]
    replicas: 3
    retention: workqueue
    minMaxAgeSeconds: 86400
  - name: MESSAGES_INBOUND_ENRICHED
    subjects: ["mio.inbound_enriched.>"]
    replicas: 1
    retention: limits
    minMaxAgeSeconds: 600

# Expected MIO-owned consumers (created by their owning service on first start).
expectedConsumers:
  - stream: MESSAGES_INBOUND
    durable: media-vault
    filterSubject: "mio.inbound.>"
    ackPolicy: explicit
    deliverPolicy: all
  - stream: MESSAGES_INBOUND
    durable: gcs-archiver
    filterSubject: "mio.inbound.>"
    ackPolicy: explicit
    deliverPolicy: all
  - stream: MESSAGES_OUTBOUND
    durable: sender-pool
    ackPolicy: explicit
    deliverPolicy: all

# Optional downstream consumers to verify without coupling core MIO to a
# specific application. Example for Channel Pulse:
# externalExpectedConsumers:
#   - stream: MESSAGES_INBOUND_ENRICHED
#     durable: channel-pulse
#     filterSubject: "mio.inbound_enriched.>"
#     ackPolicy: explicit
#     deliverPolicy: new
#     minAckWaitSeconds: 600
externalExpectedConsumers: []
