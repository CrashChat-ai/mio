apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mio-jetstream-bootstrap.fullname" . }}-verify
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mio-jetstream-bootstrap.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  # 3 pod attempts: assertion failures are deterministic and fail fast anyway;
  # transient per-connection NATS errors deserve a fresh pod, not a failed release.
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "mio-jetstream-bootstrap.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mio-jetstream-bootstrap.fullname" . }}
      automountServiceAccountToken: false
      restartPolicy: Never
      # Explicit writable /tmp: jreq stages stderr there, and a future
      # readOnlyRootFilesystem policy must not silently break the gate.
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: verify
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: NATS_URL
              value: {{ .Values.natsUrl | quote }}
            - name: RETRY_COUNT
              value: {{ .Values.retryCount | quote }}
            - name: RETRY_SLEEP
              value: {{ .Values.retrySleepSeconds | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              set -e

              # ---------------------------------------------------------------
              # VERIFY-ONLY: This script never calls nats stream add/update or
              # nats consumer add. Each stream or consumer is created by its
              # owning service. This script is a post-install assertion gate.
              # ---------------------------------------------------------------

              # Query the JS API directly (request-reply) instead of the CLI's jsm
              # wrapper — the wrapper's picker fallback + schema validation flaked
              # intermittently on prod. Capture STDOUT ONLY on success: the CLI writes
              # reconnect/warning chrome to stderr, and merging it corrupts the JSON
              # payload. Require parseable JSON; retry otherwise; surface stderr only
              # when retries are exhausted.
              jreq() {
                _try=0
                while :; do
                  _try=$((_try + 1))
                  if NJS_OUT=$(nats --server="$NATS_URL" request --raw "$1" '' 2>/tmp/njs.err) \
                     && echo "$NJS_OUT" | jq -e . >/dev/null 2>&1; then
                    return 0
                  fi
                  if [ "$_try" -ge 3 ]; then
                    NJS_OUT="$NJS_OUT
              $(cat /tmp/njs.err 2>/dev/null)"
                    return 1
                  fi
                  sleep 2
                done
              }

              # Preflight: prove NATS is reachable with the error VISIBLE, retrying —
              # a fresh hook pod can race DNS/conntrack readiness, and the assertion
              # checks below would misreport any connect failure as MISSING.
              echo "==> Preflight: NATS reachability ($NATS_URL)"
              ATTEMPT=0
              until RTT_OUT=$(nats --server="$NATS_URL" rtt 2>&1); do
                ATTEMPT=$((ATTEMPT + 1))
                if [ "$ATTEMPT" -ge "$RETRY_COUNT" ]; then
                  echo "ERROR: NATS unreachable after $RETRY_COUNT attempts:"
                  echo "$RTT_OUT" | head -3
                  exit 1
                fi
                echo "    not reachable yet (attempt $ATTEMPT/$RETRY_COUNT): $(echo "$RTT_OUT" | head -1)"
                sleep "$RETRY_SLEEP"
              done
              echo "$RTT_OUT" | head -2

              QUORUM={{ .Values.quorumReplicas | int }}
              if [ "$QUORUM" -le 1 ]; then
                # Single-node JetStream has no raft group — `stream cluster info`
                # reports zero "current" peers, so there is no quorum to wait for.
                echo "==> quorumReplicas=$QUORUM — single-node, skipping quorum wait."
              else
              echo "==> Waiting for JetStream quorum ($QUORUM replicas)..."
              ATTEMPT=0
              while [ "$ATTEMPT" -lt "$RETRY_COUNT" ]; do
                ATTEMPT=$((ATTEMPT + 1))
                echo "    Attempt $ATTEMPT/$RETRY_COUNT..."

                # Check MESSAGES_INBOUND cluster health
                INBOUND_INFO=$(nats --server="$NATS_URL" stream cluster info MESSAGES_INBOUND 2>&1 || true)
                OUTBOUND_INFO=$(nats --server="$NATS_URL" stream cluster info MESSAGES_OUTBOUND 2>&1 || true)

                INBOUND_PEERS=$(echo "$INBOUND_INFO" | grep -c "current: true" || true)
                OUTBOUND_PEERS=$(echo "$OUTBOUND_INFO" | grep -c "current: true" || true)

                if [ "$INBOUND_PEERS" -ge "$QUORUM" ] && [ "$OUTBOUND_PEERS" -ge "$QUORUM" ]; then
                  echo "    Quorum confirmed: INBOUND=$INBOUND_PEERS/$QUORUM, OUTBOUND=$OUTBOUND_PEERS/$QUORUM"
                  break
                fi

                if [ "$ATTEMPT" -ge "$RETRY_COUNT" ]; then
                  echo "ERROR: JetStream quorum not reached after $RETRY_COUNT attempts"
                  echo "  MESSAGES_INBOUND peers current: $INBOUND_PEERS (need $QUORUM)"
                  echo "  MESSAGES_OUTBOUND peers current: $OUTBOUND_PEERS (need $QUORUM)"
                  exit 1
                fi

                echo "    Quorum not ready (INBOUND=$INBOUND_PEERS, OUTBOUND=$OUTBOUND_PEERS) — sleeping ${RETRY_SLEEP}s..."
                sleep "$RETRY_SLEEP"
              done
              fi

              # ---------------------------------------------------------------
              # Verify streams exist (no mutation).
              # ---------------------------------------------------------------
              echo "==> Verifying streams..."
              {{ range .Values.expectedStreams }}
              {{ $streamName := .name }}
              echo -n "    Checking stream {{ $streamName }}... "
              if ! jreq '$JS.API.STREAM.INFO.{{ $streamName }}'; then
                echo "UNREACHABLE"
                echo "ERROR: stream {{ $streamName }} info request failed:"
                echo "$NJS_OUT" | head -3
                exit 1
              fi
              if echo "$NJS_OUT" | jq -e '.error' >/dev/null; then
                echo "MISSING"
                echo "ERROR: MISSING stream {{ $streamName }} — owning service did not provision it: $(echo "$NJS_OUT" | jq -c '.error')"
                exit 1
              fi
              STREAM_JSON=$NJS_OUT
              REPLICAS=$(echo "$STREAM_JSON" | jq -r '.config.num_replicas // 0')
              if [ "$REPLICAS" != "{{ .replicas }}" ]; then
                echo "REPLICA MISMATCH"
                echo "ERROR: stream {{ $streamName }} has replicas=$REPLICAS, expected {{ .replicas }}"
                exit 1
              fi
              {{ if .minMaxAgeSeconds }}
              MIN_MAX_AGE_NS=$(({{ .minMaxAgeSeconds }} * 1000000000))
              MAX_AGE=$(echo "$STREAM_JSON" | jq -r '.config.max_age // 0')
              if [ "$MAX_AGE" -lt "$MIN_MAX_AGE_NS" ]; then
                echo "MAX_AGE MISMATCH"
                echo "ERROR: stream {{ $streamName }} has max_age=${MAX_AGE}ns, expected at least ${MIN_MAX_AGE_NS}ns"
                exit 1
              fi
              echo "OK (replicas=$REPLICAS, max_age=${MAX_AGE}ns)"
              {{ else }}
              echo "OK (replicas=$REPLICAS)"
              {{ end }}
              {{- end }}

              # ---------------------------------------------------------------
              # Verify consumers exist (no mutation).
              # ---------------------------------------------------------------
              echo "==> Verifying consumers..."
              {{ range concat .Values.expectedConsumers .Values.externalExpectedConsumers }}
              {{ $streamName := .stream }}
              {{ $durableName := .durable }}
              echo -n "    Checking consumer {{ $durableName }} on {{ $streamName }}... "
              if ! jreq '$JS.API.CONSUMER.INFO.{{ $streamName }}.{{ $durableName }}'; then
                echo "UNREACHABLE"
                echo "ERROR: consumer {{ $durableName }} on {{ $streamName }} info request failed:"
                echo "$NJS_OUT" | head -3
                exit 1
              fi
              if echo "$NJS_OUT" | jq -e '.error' >/dev/null; then
                echo "MISSING"
                echo "ERROR: MISSING consumer {{ $durableName }} on stream {{ $streamName }} — owning service did not create it on startup: $(echo "$NJS_OUT" | jq -c '.error')"
                exit 1
              fi
              CONSUMER_JSON=$NJS_OUT
              {{ if .filterSubject }}
              FILTER_SUBJECT=$(echo "$CONSUMER_JSON" | jq -r '.config.filter_subject // ""')
              if [ "$FILTER_SUBJECT" != "{{ .filterSubject }}" ]; then
                echo "FILTER MISMATCH"
                echo "ERROR: consumer {{ $durableName }} on {{ $streamName }} has filter_subject=$FILTER_SUBJECT, expected {{ .filterSubject }}"
                exit 1
              fi
              {{ end }}
              {{ if .ackPolicy }}
              ACK_POLICY=$(echo "$CONSUMER_JSON" | jq -r '.config.ack_policy // ""')
              if [ "$ACK_POLICY" != "{{ .ackPolicy }}" ]; then
                echo "ACK POLICY MISMATCH"
                echo "ERROR: consumer {{ $durableName }} on {{ $streamName }} has ack_policy=$ACK_POLICY, expected {{ .ackPolicy }}"
                exit 1
              fi
              {{ end }}
              {{ if .deliverPolicy }}
              DELIVER_POLICY=$(echo "$CONSUMER_JSON" | jq -r '.config.deliver_policy // ""')
              if [ "$DELIVER_POLICY" != "{{ .deliverPolicy }}" ]; then
                echo "DELIVER POLICY MISMATCH"
                echo "ERROR: consumer {{ $durableName }} on {{ $streamName }} has deliver_policy=$DELIVER_POLICY, expected {{ .deliverPolicy }}"
                exit 1
              fi
              {{ end }}
              {{ if .minAckWaitSeconds }}
              MIN_ACK_WAIT_NS=$(({{ .minAckWaitSeconds }} * 1000000000))
              ACK_WAIT=$(echo "$CONSUMER_JSON" | jq -r '.config.ack_wait // 0')
              if [ "$ACK_WAIT" -lt "$MIN_ACK_WAIT_NS" ]; then
                echo "ACK WAIT MISMATCH"
                echo "ERROR: consumer {{ $durableName }} on {{ $streamName }} has ack_wait=${ACK_WAIT}ns, expected at least ${MIN_ACK_WAIT_NS}ns"
                exit 1
              fi
              {{ end }}
              echo "OK"
              {{- end }}

              echo "==> All streams and consumers verified successfully."
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          volumeMounts:
            - name: spec
              mountPath: /etc/mio-js-spec
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: spec
          configMap:
            name: {{ include "mio-jetstream-bootstrap.fullname" . }}-spec
