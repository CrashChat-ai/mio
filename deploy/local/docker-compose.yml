services:
  nats:
    image: nats:2.10-alpine
    command: -js -sd=/data -m 8222
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MON_PORT:-8222}:8222"
    volumes:
      - ./appdata/nats:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mio
      POSTGRES_USER: mio_app
      POSTGRES_PASSWORD: dev_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./appdata/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mio_app", "-d", "mio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./appdata/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/${SINK_BUCKET:-mio-messages} &&
        mc mb --ignore-existing local/${MIO_STORAGE_BUCKET:-mio-attachments}
      "
    restart: on-failure

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      MIO_PORT: "8080"
      MIO_LOG_LEVEL: "info"
      # Literal dev UUIDs (NOT ${MIO_TENANT_ID:-...}): .mise.toml exports
      # MIO_TENANT_ID=tenant-dev, a non-UUID that would otherwise leak in and
      # break env-identity inbound persist (conversations.tenant_id is uuid).
      MIO_TENANT_ID: "00000000-0000-0000-0000-000000000001"
      MIO_ACCOUNT_ID: "00000000-0000-0000-0000-000000000002"
      MIO_NATS_URLS: "nats://nats:4222"
      MIO_POSTGRES_DSN: "postgres://mio_app:dev_password@postgres:5432/mio?sslmode=disable"
      MIO_MIGRATE_ON_START: "true"
      MIO_PGX_MAX_CONNS: "5"
      MIO_GRACEFUL_SHUTDOWN_SECS: "15"
      # Zoho Cliq outbound — dev defaults point at the local cliq-mock so the
      # outbound leg works with no real Zoho org. All three OAuth vars MUST be
      # set together (NewAdapter panics on partial config). Override any to hit
      # real Zoho. CLIQ_OAUTH_URL is the full token endpoint; CLIQ_API_BASE_URL
      # is host-only (sender appends /api/v2/...).
      CLIQ_BOT_NAME: "${CLIQ_BOT_NAME:-dev-bot}"
      CLIQ_CLIENT_ID: "${CLIQ_CLIENT_ID:-dev-client-id}"
      CLIQ_CLIENT_SECRET: "${CLIQ_CLIENT_SECRET:-dev-client-secret}"
      CLIQ_REFRESH_TOKEN: "${CLIQ_REFRESH_TOKEN:-dev-refresh-token}"
      CLIQ_API_BASE_URL: "${CLIQ_API_BASE_URL:-http://cliq-mock:8080}"
      CLIQ_OAUTH_URL: "${CLIQ_OAUTH_URL:-http://cliq-mock:8080/oauth/v2/token}"
    volumes:
      - ./secrets:/etc/mio/secrets:ro
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      cliq-mock:
        condition: service_started
    restart: unless-stopped

  cliq-mock:
    build:
      context: ./cliq-mock
    ports:
      - "${CLIQ_MOCK_PORT:-8090}:8080"
    restart: unless-stopped

  # Seeds the env-identity tenant + account once the gateway has migrated the
  # schema. Without it, inbound persist fails the tenant/account FKs and the Cliq
  # loop never starts. `make cliq-up` blocks on this (compose wait) so no inbound
  # races ahead of the seed. Polls for the schema, then runs seed.sql ONCE and
  # fails fast (exit 1) on a real seed error instead of looping forever.
  db-seed:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: dev_password
    volumes:
      - ./seed.sql:/seed.sql:ro
    entrypoint:
      - sh
      - -c
      - |
        for i in $$(seq 1 60); do
          if psql -h postgres -U mio_app -d mio -tAc "select to_regclass('public.accounts')" 2>/dev/null | grep -q .; then
            if psql -h postgres -U mio_app -d mio -v ON_ERROR_STOP=1 -f /seed.sql; then
              echo "db-seed: done"; exit 0
            fi
            echo "db-seed: seed.sql FAILED (see error above)" >&2; exit 1
          fi
          echo "db-seed: schema not ready (gateway migrating) [$$i/60]"; sleep 2
        done
        echo "db-seed: gave up after 120s waiting for schema" >&2; exit 1
    restart: "no"

  admin:
    profiles: ["operator"]
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile.admin
    ports:
      - "${ADMIN_PORT:-9090}:9090"
    environment:
      MIO_ENV: "dev"
      MIO_ADMIN_ADDR: "0.0.0.0:9090"
      MIO_ADMIN_PUBLIC_URL: "${MIO_ADMIN_PUBLIC_URL:-http://localhost:9090}"
      MIO_GATEWAY_PUBLIC_URL: "${MIO_GATEWAY_PUBLIC_URL:-http://localhost:8080}"
      MIO_ADMIN_ALLOW_CIDRS: "${MIO_ADMIN_ALLOW_CIDRS:-0.0.0.0/0,::/0}"
      MIO_POSTGRES_DSN: "postgres://mio_app:dev_password@postgres:5432/mio?sslmode=disable"
      MIO_NATS_URLS: "nats://nats:4222"
    depends_on:
      gateway:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  mio-web-api:
    profiles: ["operator"]
    build:
      context: ../..
      dockerfile: ui/web/Dockerfile
    environment:
      MIO_WEB_ADDR: ":8080"
      MIO_WEB_PUBLIC_URL: "${MIO_WEB_PUBLIC_URL:-http://localhost:8081}"
      MIO_WEB_AUTH_MODE: "${MIO_WEB_AUTH_MODE:-dev}"
      MIO_WEB_COOKIE_SECURE: "${MIO_WEB_COOKIE_SECURE:-false}"
      MIO_WEB_OPERATOR_EMAILS: "${MIO_WEB_OPERATOR_EMAILS:-operator@localhost}"
      MIO_WEB_OPERATOR_DOMAINS: "${MIO_WEB_OPERATOR_DOMAINS:-}"
      MIO_WEB_OPERATOR_DEFAULT_ROLE: "${MIO_WEB_OPERATOR_DEFAULT_ROLE:-viewer}"
      MIO_WEB_OPERATOR_ROLES: "${MIO_WEB_OPERATOR_ROLES:-operator@localhost=credential-admin}"
      MIO_WEB_DEV_OPERATOR_EMAIL: "${MIO_WEB_DEV_OPERATOR_EMAIL:-operator@localhost}"
      MIO_WEB_DEV_OPERATOR_NAME: "${MIO_WEB_DEV_OPERATOR_NAME:-Local Operator}"
      MIO_WEB_DEV_OPERATOR_ROLE: "${MIO_WEB_DEV_OPERATOR_ROLE:-credential-admin}"
      MIO_WEB_SESSION_TTL: "${MIO_WEB_SESSION_TTL:-12h}"
      MIO_WEB_GOOGLE_CLIENT_ID: "${MIO_WEB_GOOGLE_CLIENT_ID:-}"
      MIO_WEB_GOOGLE_CLIENT_SECRET: "${MIO_WEB_GOOGLE_CLIENT_SECRET:-}"
      MIO_WEB_OIDC_REDIRECT_URL: "${MIO_WEB_OIDC_REDIRECT_URL:-}"
      MIO_WEB_STATE_SECRET: "${MIO_WEB_STATE_SECRET:-local-dev-state-secret-change-me}"
      MIO_WEB_DATABASE_DSN: "postgres://mio_app:dev_password@postgres:5432/mio?sslmode=disable"
      MIO_ADMIN_URL: "http://admin:9090"
    depends_on:
      admin:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mio-web-frontend:
    profiles: ["operator"]
    build:
      context: ../..
      dockerfile: ui/web/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
    restart: unless-stopped

  mio-web-proxy:
    profiles: ["operator"]
    image: caddy:2.8-alpine
    ports:
      - "${MIO_WEB_PORT:-8081}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      mio-web-api:
        condition: service_started
      mio-web-frontend:
        condition: service_started
    restart: unless-stopped

  sink-gcs:
    build:
      context: ../..
      dockerfile: services/sink-gcs/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      SINK_BACKEND: minio
      SINK_BUCKET: ${SINK_BUCKET:-mio-messages}
      SINK_ENDPOINT: http://minio:9000
      SINK_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      SINK_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  media-vault:
    profiles: ["media"]
    build:
      context: ../..
      dockerfile: services/media-vault/Dockerfile
    environment:
      MIO_NATS_URLS: nats://nats:4222
      # Literal dev UUIDs — see gateway block (mise exports a non-UUID MIO_TENANT_ID).
      MIO_TENANT_ID: "00000000-0000-0000-0000-000000000001"
      MIO_ACCOUNT_ID: "00000000-0000-0000-0000-000000000002"
      MIO_STORAGE_BACKEND: s3
      MIO_STORAGE_BUCKET: "${MIO_STORAGE_BUCKET:-mio-attachments}"
      MIO_STORAGE_S3_ENDPOINT: http://minio:9000
      MIO_STORAGE_S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MIO_STORAGE_S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MIO_STORAGE_S3_USE_SSL: "false"
      MIO_CLIQ_CLIENT_ID: "${MIO_CLIQ_CLIENT_ID:-}"
      MIO_CLIQ_CLIENT_SECRET: "${MIO_CLIQ_CLIENT_SECRET:-}"
      MIO_CLIQ_REFRESH_TOKEN: "${MIO_CLIQ_REFRESH_TOKEN:-}"
    depends_on:
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  echo-consumer:
    build:
      context: ../..
      dockerfile: examples/echo-consumer/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
      gateway:
        condition: service_started
    restart: on-failure
