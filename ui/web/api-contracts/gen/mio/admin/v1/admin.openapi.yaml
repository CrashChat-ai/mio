          title: conversation_id
          description: optional filter
      title: TailMessagesRequest
      additionalProperties: false
    mio.admin.v1.TailMessagesResponse:
      type: object
      properties:
        id:
          type: string
          title: id
          description: |-
            Subset of mio.v1.Message useful for UI; not the full canonical envelope
             because rendering doesn't need attributes / attachments here. Future
             versions can carry the full Message — additive only.
        tenantId:
          type: string
          title: tenant_id
        accountId:
          type: string
          title: account_id
        conversationId:
          type: string
          title: conversation_id
        channelType:
          type: string
          title: channel_type
        senderDisplay:
          type: string
          title: sender_display
        text:
          type: string
          title: text
        receivedAt:
          title: received_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: TailMessagesResponse
      additionalProperties: false
    mio.admin.v1.Tenant:
      type: object
      properties:
        id:
          type: string
          title: id
        slug:
          type: string
          title: slug
        displayName:
          type: string
          title: display_name
        status:
          type: string
          title: status
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        disabledAt:
          title: disabled_at
          description: empty unless disabled
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: Tenant
      additionalProperties: false
    mio.admin.v1.UpdateAccountRequest:
      type: object
      properties:
        accountId:
          type: string
          title: account_id
        displayName:
          type: string
          title: display_name
        externalId:
          type: string
          title: external_id
      title: UpdateAccountRequest
      additionalProperties: false
    mio.admin.v1.UpdateAccountResponse:
      type: object
      properties:
        account:
          title: account
          $ref: '#/components/schemas/mio.admin.v1.Account'
      title: UpdateAccountResponse
      additionalProperties: false
    mio.v1.Attachment.Kind:
      type: string
      title: Kind
      enum:
        - KIND_UNSPECIFIED
        - KIND_IMAGE
        - KIND_FILE
        - KIND_AUDIO
        - KIND_VIDEO
        - KIND_LINK
      description: Kind classifies the attachment for rendering and routing decisions.
    mio.v1.ChannelCapabilities:
      type: object
      properties:
        supportsEdit:
          type: boolean
          title: supports_edit
          description: '--- feature flags ---'
        supportsDelete:
          type: boolean
          title: supports_delete
        supportsReactions:
          type: boolean
          title: supports_reactions
        supportsThreads:
          type: boolean
          title: supports_threads
        supportsTyping:
          type: boolean
          title: supports_typing
        supportsPresence:
          type: boolean
          title: supports_presence
        allowedAttachments:
          type: array
          items:
            $ref: '#/components/schemas/mio.v1.Attachment.Kind'
          title: allowed_attachments
          description: |-
            --- attachment policy ---
             Empty allowed_attachments means the adapter does not handle attachments;
             include explicit kinds (IMAGE, FILE, AUDIO, VIDEO, LINK) when supported.
        maxTextBytes:
          type: integer
          title: max_text_bytes
          format: int32
          description: |-
            --- limits ---
             max_text_bytes is the platform's hard limit; admin UI surfaces this as
             a hint before send.
        rateLimitPerSecond:
          type: integer
          title: rate_limit_per_second
          format: int32
          description: |-
            rate_limit_per_second is a per-bucket cap; bucket key is given by
             rate_limit_scope (one of "account", "account:conversation").
        rateLimitScope:
          type: string
          title: rate_limit_scope
        authKind:
          type: string
          title: auth_kind
          description: |-
            --- auth flavor ---
             auth_kind names the credential model: "oauth2_refresh" (Cliq, Slack),
             "bot_token" (Telegram), "hmac_webhook" (inbound-only signed webhooks).
             CredentialAdapter implementations branch on this.
        editWindowSeconds:
          type: integer
          title: edit_window_seconds
          format: int32
          description: |-
            --- edit / delete windows ---
             edit_window_seconds is how long after Send a message may be edited;
             0 = no platform-enforced limit. delete_window_seconds is analogous.
        deleteWindowSeconds:
          type: integer
          title: delete_window_seconds
          format: int32
      title: ChannelCapabilities
      additionalProperties: false
      description: |-
        ChannelCapabilities advertises what a single channel adapter can do, so the
         admin API (and UI/TUI) can render install flows and feature toggles without
         hardcoding per-channel knowledge. Returned by Adapter.Capabilities().

         Hard-coded in each adapter package (Cliq's lives in zohocliq/sender.go).
         A regression test asserts the struct matches expectation verbatim — stale
         capability advertisement is caught loudly instead of drifting silently.
security: []
tags:
  - name: mio.admin.v1.AdminService
    description: |-
      AdminService is the control-plane API: tenants, channel installs, message
       inspection. Internal-only by default — the admin binary binds 127.0.0.1
       and the auth middleware allowlists loopback + MIO_ADMIN_ALLOW_CIDRS.

       Wire stability: the surrounding buf module has WIRE_JSON breaking checks
       enabled. Rename via `deprecated_alias` instead of in-place edits; new
       fields must be appended.
