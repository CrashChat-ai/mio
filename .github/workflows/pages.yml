name: Deploy docs to GitHub Pages

# Manual-only: the crashchat-ai org currently disables Pages creation
# ("GitHub organization administrators disabled Pages creation"), so this can't
# auto-publish. Re-add the `push:` trigger once an org admin enables Pages
# (Settings → Pages → allow), or repoint the build at another static host.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # self-enable Pages (build_type=workflow) on first run
      - name: Build with Astro
        uses: withastro/action@v6
        with:
          path: ./website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
