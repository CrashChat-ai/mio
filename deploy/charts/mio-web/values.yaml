replicaCount: 1

image:
  repository: ghcr.io/crashchat-ai/mio/web
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 80

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

admin:
  # Use a cluster DNS name or service mesh endpoint. Do not point this at
  # localhost unless the AdminService runs in the same container.
  url: "http://mio-admin:9090"
  allowCIDRs: []

env: []
