name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ── Path filter ────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      sdk-py: ${{ steps.filter.outputs.sdk-py }}
      proto: ${{ steps.filter.outputs.proto }}
      helm: ${{ steps.filter.outputs.helm }}
      docs: ${{ steps.filter.outputs.docs }}
      ui-web: ${{ steps.filter.outputs.ui-web }}
      media-vault: ${{ steps.filter.outputs.media-vault }}
      bq-schema: ${{ steps.filter.outputs.bq-schema }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
              - 'channels/**'
              - 'sdks/go/**'
              - 'proto/gen/go/**'
              - 'go.mod'
              - 'go.sum'
            sdk-py:
              - 'sdks/python/**'
              - 'examples/echo-consumer/**'
              - 'proto/gen/py/**'
            proto:
              - 'proto/**'
              - 'buf.yaml'
              - 'buf.gen.yaml'
            helm:
              - 'deploy/charts/**'
            docs:
              - 'README.md'
              - 'docs/**'
              - 'Makefile'
              - 'scripts/check-planning-drift.sh'
            ui-web:
              - 'ui/web/**'
              - 'go.mod'
              - 'go.sum'
              - '.mise.toml'
              - '.dockerignore'
              - 'Makefile'
              - '.github/workflows/ci.yaml'
            media-vault:
              - 'services/media-vault/**'
              - 'sdks/go/**'
              - 'proto/gen/go/**'
            bq-schema:
              - 'services/sink-gcs/sql/**'
              - 'proto/mio/v1/**'

  # ── Planning/docs drift checks ─────────────────────────────────────────────
  docs-check:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check planning/docs drift
        run: make docs-check

  # ── Web admin shell ──────────────────────────────────────────────────────
  test-ui-web:
    needs: changes
    if: needs.changes.outputs.ui-web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Install web dependencies
        run: pnpm --dir ui/web/app install --frozen-lockfile

      - name: Build web app
        run: pnpm --dir ui/web/app build

      - name: buf generate
        run: buf generate proto

      - name: Test mio-web
        run: go test ./ui/web/... -count=1

  # ── Proto lint + breaking check ────────────────────────────────────────────
  test-proto:
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: buf lint
        run: buf lint proto

      - name: buf breaking (skip on first PR with empty main)
        # Skip breaking check on the initial PR when origin/main has no proto files.
        if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
        run: |
          buf breaking --against ".git#branch=main" proto || \
            echo "::warning::buf breaking check skipped or found no baseline (first PR?)"

  # ── Gateway + sdk-go tests ─────────────────────────────────────────────────
  test-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: golangci-lint
        run: |
          golangci-lint run ./services/gateway/... ./channels/...
          (cd sdks/go && golangci-lint run ./...)

      - name: go test (race detector)
        run: |
          go test -race -cover ./services/gateway/... ./channels/...
          (cd sdks/go && go test -race -cover ./...)

  # ── Python SDK + echo-consumer tests ──────────────────────────────────────
  test-python:
    needs: changes
    if: needs.changes.outputs.sdk-py == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: ruff lint + format check
        run: |
          ruff check sdks/python examples/echo-consumer
          ruff format --check sdks/python examples/echo-consumer

      - name: pytest sdk-py
        run: |
          cd sdks/python && uv run pytest tests/ -v -m "not integration"

      - name: pytest echo-consumer
        run: |
          uv run --project examples/echo-consumer pytest examples/echo-consumer/tests/ -v

  # ── Helm lint ──────────────────────────────────────────────────────────────
  helm-lint:
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: "3.14.4"

      - name: Add NATS helm repo
        run: helm repo add nats https://nats-io.github.io/k8s/helm/charts/

      - name: helm dependency update (mio-nats)
        run: helm dependency update deploy/charts/mio-nats

      - name: helm lint all charts
        run: |
          helm lint deploy/charts/mio-nats
          helm lint deploy/charts/mio-jetstream-bootstrap
          helm lint deploy/charts/mio-gateway
          helm lint deploy/charts/mio-web
          helm lint deploy/charts/mio-sink-gcs
          helm lint deploy/charts/mio-echo-consumer
          helm lint deploy/charts/mio-media-vault

      - name: helm template (render check)
        run: |
          helm template test-nats deploy/charts/mio-nats \
            --set nats.config.jetstream.fileStore.pvc.storageClassName=standard
          helm template test-bootstrap deploy/charts/mio-jetstream-bootstrap
          helm template test-gateway deploy/charts/mio-gateway \
            --set secrets.existingSecret=mio-gateway-secrets
          helm template test-web deploy/charts/mio-web
          helm template test-sink-gcs deploy/charts/mio-sink-gcs \
            --set serviceAccount.gcpServiceAccount=mio-sink-gcs@example.iam.gserviceaccount.com
          helm template test-echo-consumer deploy/charts/mio-echo-consumer
          helm template test-media-vault deploy/charts/mio-media-vault \
            --set serviceAccount.gcpServiceAccount=mio-attachments@example.iam.gserviceaccount.com

  # ── Build + push gateway image (main push only) ────────────────────────────
  build-gateway:
    needs: [changes, test-gateway]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/gateway/Dockerfile
          push: true
          # Tag policy: sha (always) + main (rolling) + semver (on git tag only).
          # Never floating :latest on non-tag pushes.
          tags: |
            ghcr.io/crashchat-ai/mio/gateway:${{ github.sha }}
            ghcr.io/crashchat-ai/mio/gateway:main
          # Registry cache (not gha cache — 10GB cap thrashes for two services).
          cache-from: type=registry,ref=ghcr.io/crashchat-ai/mio/gateway:cache
          cache-to: type=registry,ref=ghcr.io/crashchat-ai/mio/gateway:cache,mode=max
          platforms: linux/amd64

  # ── Build + push sink-gcs image (main push only) ──────────────────────────
  build-sink-gcs:
    needs: changes
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sink-gcs
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/sink-gcs/Dockerfile
          push: true
          tags: |
            ghcr.io/crashchat-ai/mio/sink-gcs:${{ github.sha }}
            ghcr.io/crashchat-ai/mio/sink-gcs:main
          cache-from: type=registry,ref=ghcr.io/crashchat-ai/mio/sink-gcs:cache
          cache-to: type=registry,ref=ghcr.io/crashchat-ai/mio/sink-gcs:cache,mode=max
          platforms: linux/amd64

  # ── Build + push mio-web image (main push only) ──────────────────────────
  build-mio-web:
    needs: [changes, test-ui-web]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.ui-web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push mio-web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ui/web/Dockerfile
          push: true
          tags: |
            ghcr.io/crashchat-ai/mio/web:${{ github.sha }}
            ghcr.io/crashchat-ai/mio/web:main
          cache-from: type=registry,ref=ghcr.io/crashchat-ai/mio/web:cache
          cache-to: type=registry,ref=ghcr.io/crashchat-ai/mio/web:cache,mode=max
          platforms: linux/amd64

  # ── media-vault test ────────────────────────────────────────────
  test-media-vault:
    needs: changes
    if: needs.changes.outputs.media-vault == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: buf generate
        run: buf generate proto

      - name: go test
        run: go test ./services/media-vault/...

  # ── Build + push media-vault image (main push only) ─────────────
  build-media-vault:
    needs: [changes, test-media-vault]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.media-vault == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push media-vault
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/media-vault/Dockerfile
          push: true
          tags: |
            ghcr.io/crashchat-ai/mio/media-vault:${{ github.sha }}
            ghcr.io/crashchat-ai/mio/media-vault:main
          cache-from: type=registry,ref=ghcr.io/crashchat-ai/mio/media-vault:cache
          cache-to: type=registry,ref=ghcr.io/crashchat-ai/mio/media-vault:cache,mode=max
          platforms: linux/amd64

  # ── BQ schema contract: proto ↔ messages_schema.json must stay aligned ────
  # This guards a producer-side invariant. Every downstream consumer (e.g.
  # ab-spectrum/infra/loaders/bq-mio) reads from this schema; drift here
  # silently NULLs columns at consumer load time.
  test-bq-schema:
    needs: changes
    if: needs.changes.outputs.bq-schema == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON schema syntax
        run: jq -e 'length > 0' services/sink-gcs/sql/messages_schema.json

      - name: Schema drift (proto vs BQ)
        run: services/sink-gcs/sql/check-proto-drift.sh

  # ── Build + push echo-consumer image (main push only) ─────────────────────
  build-echo-consumer:
    needs: changes
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          cache: true

      - name: buf generate (proto/gen/* are gitignored)
        run: buf generate proto

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push echo-consumer
        uses: docker/build-push-action@v7
        with:
          context: .
          file: examples/echo-consumer/Dockerfile
          push: true
          tags: |
            ghcr.io/crashchat-ai/mio/echo-consumer:${{ github.sha }}
            ghcr.io/crashchat-ai/mio/echo-consumer:main
          cache-from: type=registry,ref=ghcr.io/crashchat-ai/mio/echo-consumer:cache
          cache-to: type=registry,ref=ghcr.io/crashchat-ai/mio/echo-consumer:cache,mode=max
          platforms: linux/amd64
