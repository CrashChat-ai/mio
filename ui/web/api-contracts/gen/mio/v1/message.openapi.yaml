openapi: 3.1.0
info:
  title: mio.v1
paths: {}
components:
  schemas:
    google.protobuf.Timestamp:
      type: string
      examples:
        - "2023-01-15T01:30:15.01Z"
        - "2024-12-25T12:00:00Z"
      format: date-time
      description: |-
        A Timestamp represents a point in time independent of any time zone or local
         calendar, encoded as a count of seconds and fractions of seconds at
         nanosecond resolution. The count is relative to an epoch at UTC midnight on
         January 1, 1970, in the proleptic Gregorian calendar which extends the
         Gregorian calendar backwards to year one.

         All minutes are 60 seconds long. Leap seconds are "smeared" so that no leap
         second table is needed for interpretation, using a [24-hour linear
         smear](https://developers.google.com/time/smear).

         The range is from 0001-01-01T00:00:00Z to 9999-12-31T23:59:59.999999999Z. By
         restricting to that range, we ensure that we can convert to and from [RFC
         3339](https://www.ietf.org/rfc/rfc3339.txt) date strings.

         # Examples

         Example 1: Compute Timestamp from POSIX `time()`.

             Timestamp timestamp;
             timestamp.set_seconds(time(NULL));
             timestamp.set_nanos(0);

         Example 2: Compute Timestamp from POSIX `gettimeofday()`.

             struct timeval tv;
             gettimeofday(&tv, NULL);

             Timestamp timestamp;
             timestamp.set_seconds(tv.tv_sec);
             timestamp.set_nanos(tv.tv_usec * 1000);

         Example 3: Compute Timestamp from Win32 `GetSystemTimeAsFileTime()`.

             FILETIME ft;
             GetSystemTimeAsFileTime(&ft);
             UINT64 ticks = (((UINT64)ft.dwHighDateTime) << 32) | ft.dwLowDateTime;

             // A Windows tick is 100 nanoseconds. Windows epoch 1601-01-01T00:00:00Z
             // is 11644473600 seconds before Unix epoch 1970-01-01T00:00:00Z.
             Timestamp timestamp;
             timestamp.set_seconds((INT64) ((ticks / 10000000) - 11644473600LL));
             timestamp.set_nanos((INT32) ((ticks % 10000000) * 100));

         Example 4: Compute Timestamp from Java `System.currentTimeMillis()`.

             long millis = System.currentTimeMillis();

             Timestamp timestamp = Timestamp.newBuilder().setSeconds(millis / 1000)
                 .setNanos((int) ((millis % 1000) * 1000000)).build();

         Example 5: Compute Timestamp from Java `Instant.now()`.

             Instant now = Instant.now();

             Timestamp timestamp =
                 Timestamp.newBuilder().setSeconds(now.getEpochSecond())
                     .setNanos(now.getNano()).build();

         Example 6: Compute Timestamp from current time in Python.

             timestamp = Timestamp()
             timestamp.GetCurrentTime()

         # JSON Mapping

         In JSON format, the Timestamp type is encoded as a string in the
         [RFC 3339](https://www.ietf.org/rfc/rfc3339.txt) format. That is, the
         format is "{year}-{month}-{day}T{hour}:{min}:{sec}[.{frac_sec}]Z"
         where {year} is always expressed using four digits while {month}, {day},
         {hour}, {min}, and {sec} are zero-padded to two digits each. The fractional
         seconds, which can go up to 9 digits (i.e. up to 1 nanosecond resolution),
         are optional. The "Z" suffix indicates the timezone ("UTC"); the timezone
         is required. A proto3 JSON serializer should always use UTC (as indicated by
         "Z") when printing the Timestamp type and a proto3 JSON parser should be
         able to accept both UTC and other timezones (as indicated by an offset).

         For example, "2017-01-15T01:30:15.01Z" encodes 15.01 seconds past
         01:30 UTC on January 15, 2017.

         In JavaScript, one can convert a Date object to this format using the
         standard
         [toISOString()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/toISOString)
         method. In Python, a standard `datetime.datetime` object can be converted
         to this format using
         [`strftime`](https://docs.python.org/2/library/time.html#time.strftime) with
         the time format spec '%Y-%m-%dT%H:%M:%S.%fZ'. Likewise, in Java, one can use
         the Joda Time's [`ISODateTimeFormat.dateTime()`](
         http://joda-time.sourceforge.net/apidocs/org/joda/time/format/ISODateTimeFormat.html#dateTime()
         ) to obtain a formatter capable of generating timestamps in this format.
    mio.v1.Attachment:
      type: object
      properties:
        kind:
          title: kind
          $ref: '#/components/schemas/mio.v1.Attachment.Kind'
        url:
          type: string
          title: url
        mime:
          type: string
          title: mime
        bytes:
          type:
            - integer
            - string
          title: bytes
          format: int64
        filename:
          type: string
          title: filename
        storageKey:
          type: string
          title: storage_key
          description: |-
            --- storage rewrite (set by attachment-downloader sidecar) ---
             Stable object-storage key (e.g. "mio/attachments/channel_type=zoho_cliq/date=2026-05-09/{sha256[:2]}/{sha256}.png").
             Empty until the sidecar persists bytes. Independent of `url` so consumers
             that hold long-lived references can re-mint signed URLs from the key.
        contentSha256:
          type: string
          title: content_sha256
          description: SHA-256 of the persisted bytes (lowercase hex). Empty if not yet persisted.
        errorCode:
          title: error_code
          description: Persistence outcome. ATTACHMENT_OK on success.
          $ref: '#/components/schemas/mio.v1.Attachment.ErrorCode'
      title: Attachment
      additionalProperties: false
      description: Attachment represents a file, image, link, or media item attached to a message.
    mio.v1.Attachment.ErrorCode:
      type: string
      title: ErrorCode
      enum:
        - ERROR_CODE_UNSPECIFIED
        - ERROR_CODE_OK
        - ERROR_CODE_EXPIRED
        - ERROR_CODE_FORBIDDEN
        - ERROR_CODE_NOT_FOUND
        - ERROR_CODE_TOO_LARGE
        - ERROR_CODE_STORAGE
        - ERROR_CODE_TIMEOUT
      description: |-
        Bounded-set error code surfaced by the attachment-downloader sidecar
         when persistence fails. Empty/UNSPECIFIED on the gateway-publish path.
         Downstream Message still flows; AI consumers should soft-handle
         missing bytes when error_code != ATTACHMENT_OK.
    mio.v1.Attachment.Kind:
      type: string
      title: Kind
      enum:
        - KIND_UNSPECIFIED
        - KIND_IMAGE
        - KIND_FILE
        - KIND_AUDIO
        - KIND_VIDEO
        - KIND_LINK
      description: Kind classifies the attachment for rendering and routing decisions.
    mio.v1.ConversationKind:
      type: string
      title: ConversationKind
      enum:
        - CONVERSATION_KIND_UNSPECIFIED
        - CONVERSATION_KIND_DM
        - CONVERSATION_KIND_GROUP_DM
        - CONVERSATION_KIND_CHANNEL_PUBLIC
        - CONVERSATION_KIND_CHANNEL_PRIVATE
        - CONVERSATION_KIND_THREAD
        - CONVERSATION_KIND_FORUM_POST
        - CONVERSATION_KIND_BROADCAST
      description: |-
        ConversationKind classifies the structural shape of a conversation.
         Used by adapters to route and by consumers for analytics/policy.
         Enum zero-value is UNSPECIFIED per proto3 best practices (buf STANDARD lint).
    mio.v1.Message:
      type: object
      properties:
        id:
          type: string
          title: id
          description: '--- identity --- mio UUID v7'
        schemaVersion:
          type: integer
          title: schema_version
          format: int32
          description: = 1; SDK rejects mismatch on publish
        tenantId:
          type: string
          title: tenant_id
          description: '--- four-tier scope (foundation) ---'
        accountId:
          type: string
          title: account_id
          description: mio UUID for the channel install (accounts table)
        channelType:
          type: string
          title: channel_type
          description: string from proto/channels.yaml registry
        conversationId:
          type: string
          title: conversation_id
          description: '--- where (the conversation) --- mio UUID'
        conversationExternalId:
          type: string
          title: conversation_external_id
          description: platform-side opaque id
        conversationKind:
          title: conversation_kind
          $ref: '#/components/schemas/mio.v1.ConversationKind'
        parentConversationId:
          type: string
          title: parent_conversation_id
          description: empty unless thread / forum-post
        sourceMessageId:
          type: string
          title: source_message_id
          description: '--- idempotency + threading --- platform message id; (account_id, source_message_id) is unique'
        threadRootMessageId:
          type: string
          title: thread_root_message_id
          description: empty if not in a Matrix-style thread
        sender:
          title: sender
          description: '--- payload ---'
          $ref: '#/components/schemas/mio.v1.Sender'
        text:
          type: string
          title: text
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/mio.v1.Attachment'
          title: attachments
        receivedAt:
          title: received_at
          description: '--- timing ---'
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        attributes:
          type: object
          title: attributes
          additionalProperties:
            type: string
            title: value
          description: |-
            --- escape hatch ---
             Channel-specific data lives here until it reaches the promotion threshold
             (≥2 consumers OR ≥2 channels read the same key → promote to typed field).
             Always use named constants, never string literals. See CONTRIBUTING.md.
        relation:
          title: relation
          description: |-
            MessageRelation links this message to another (reply/edit/delete/reaction/pin).
             Empty for plain messages; populated for linked envelopes.
          $ref: '#/components/schemas/mio.v1.MessageRelation'
      title: Message
      additionalProperties: false
      description: |-
        Message is the canonical inbound envelope published to MESSAGES_INBOUND.
         Every consumer (MIU AI service, sink-gcs, analytics) receives this shape.

         Design invariants (locked — do not change without a migration plan):
           1. Four-tier addressing: tenant_id → account_id → conversation_id → id.
              Both tenant_id and account_id are present from message #1.
           2. channel_type is a string referencing proto/channels.yaml. Not an enum —
              new channels are added to the registry without proto regeneration.
           3. Idempotency key: (account_id, source_message_id). NOT (channel_type, source_message_id)
              — the latter breaks for tenants running two workspaces of the same platform.
           4. attributes map<string,string> is the only legal home for channel-specific data.
              Promotion rule: any key read by ≥2 consumers OR written by ≥2 channels
              gets promoted to a typed field. See CONTRIBUTING.md for details.
              Use named constants (e.g. const AttrSlackTS = "slack_ts"), not string literals.
    mio.v1.Message.AttributesEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: AttributesEntry
      additionalProperties: false
    mio.v1.MessageRelation:
      type: object
      properties:
        kind:
          title: kind
          $ref: '#/components/schemas/mio.v1.MessageRelation.Kind'
        targetMessageId:
          type: string
          title: target_message_id
          description: mio UUID of the target
        targetExternalId:
          type: string
          title: target_external_id
          description: platform-side opaque id
        reactionEmoji:
          type: string
          title: reaction_emoji
          description: populated when kind = KIND_REACTION
      title: MessageRelation
      additionalProperties: false
      description: |-
        MessageRelation links one message to another: reply, edit, delete, reaction,
         or pin. Carried on Message (field 17) and SendCommand (field 15).

         target_message_id is the mio UUID; target_external_id is the platform's id.
         Both are populated when known; consumers should prefer target_message_id
         when present (mio's identity is stable across renames/migrations).
    mio.v1.MessageRelation.Kind:
      type: string
      title: Kind
      enum:
        - KIND_UNSPECIFIED
        - KIND_REPLY
        - KIND_EDIT
        - KIND_DELETE
        - KIND_REACTION
        - KIND_PIN
      description: |-
        Kind classifies the relation.
         UNSPECIFIED is the zero value — proto3 best practice and buf STANDARD lint.
    mio.v1.PeerKind:
      type: string
      title: PeerKind
      enum:
        - PEER_KIND_UNSPECIFIED
        - PEER_KIND_DIRECT
        - PEER_KIND_GROUP
      description: |-
        PeerKind distinguishes direct vs. group senders.
         Kept on the wire for fast policy routing without DB lookup.
    mio.v1.Sender:
      type: object
      properties:
        externalId:
          type: string
          title: external_id
          description: platform user id (cliq sender_id, slack user id, ...)
        displayName:
          type: string
          title: display_name
        peerKind:
          title: peer_kind
          description: direct | group — used for fast policy routing
          $ref: '#/components/schemas/mio.v1.PeerKind'
        isBot:
          type: boolean
          title: is_bot
      title: Sender
      additionalProperties: false
      description: |-
        Sender carries the platform-side identity of the message author.
         user_id (canonical mio user) is deliberately absent — cross-channel identity
         merge runs in MIU after the message is consumed, not at ingest time. Keeping
         the DB lookup off the hot path lets the gateway ack Cliq within the 5 s deadline.
security: []
