# FluxCD HelmRelease for mio-media-vault.
#
# This file is the source of truth that should be committed to the infra repo
# at fluxcd/apps/prod/mio/release-media-vault.yaml. It lives here
# in the mio repo too so the chart and HelmRelease evolve together.
#
# Don't forget to also append `- release-media-vault.yaml` to
# fluxcd/apps/prod/mio/kustomization.yaml in the infra repo.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mio-media-vault
  namespace: mio
spec:
  interval: 30m0s
  timeout: 10m
  dependsOn:
    - name: mio-nats
    - name: mio-gateway
  chart:
    spec:
      chart: deploy/charts/mio-media-vault
      sourceRef:
        kind: GitRepository
        name: mio-charts
        namespace: mio
  values:
    image:
      tag: "main"  # bump to the merge SHA on each release
    serviceAccount:
      gcpServiceAccount: "mio-attachments@dp-prod-7e26.iam.gserviceaccount.com"
    config:
      storageBucket: "ab-spectrum-backups-prod"
      storagePrefix: "mio/attachments/"
