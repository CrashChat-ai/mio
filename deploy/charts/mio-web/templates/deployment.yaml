apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mio-web.fullname" . }}
  labels:
    {{- include "mio-web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mio-web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mio-web.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mio-web
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MIO_WEB_ADDR
              value: ":8080"
            - name: MIO_WEB_PUBLIC_URL
              value: {{ .Values.web.publicUrl | quote }}
            - name: MIO_WEB_AUTH_MODE
              value: {{ .Values.web.authMode | quote }}
            - name: MIO_WEB_COOKIE_SECURE
              value: {{ .Values.web.cookieSecure | quote }}
            - name: MIO_WEB_SESSION_TTL
              value: {{ .Values.session.ttl | quote }}
            - name: MIO_WEB_OPERATOR_EMAILS
              value: {{ join "," .Values.operators.emails | quote }}
            - name: MIO_WEB_OPERATOR_DOMAINS
              value: {{ join "," .Values.operators.domains | quote }}
            - name: MIO_ADMIN_URL
              value: {{ .Values.admin.url | quote }}
            {{- $redirectURL := .Values.google.redirectUrl }}
            {{- if and (not $redirectURL) .Values.web.publicUrl }}
            {{- $redirectURL = printf "%s/auth/callback" (trimSuffix "/" .Values.web.publicUrl) }}
            {{- end }}
            {{- if $redirectURL }}
            - name: MIO_WEB_OIDC_REDIRECT_URL
              value: {{ $redirectURL | quote }}
            {{- end }}
            {{- if .Values.session.databaseSecretName }}
            - name: MIO_WEB_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.session.databaseSecretName | quote }}
                  key: {{ .Values.session.databaseSecretKey | quote }}
            {{- end }}
            {{- if .Values.google.existingSecret }}
            - name: MIO_WEB_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.google.existingSecret | quote }}
                  key: {{ .Values.google.clientIDKey | quote }}
            - name: MIO_WEB_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.google.existingSecret | quote }}
                  key: {{ .Values.google.clientSecretKey | quote }}
            {{- end }}
            {{- if .Values.stateSecret.existingSecret }}
            - name: MIO_WEB_STATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.stateSecret.existingSecret | quote }}
                  key: {{ .Values.stateSecret.key | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
